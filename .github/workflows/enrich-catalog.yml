name: Enrich Catalog
# Hits the Vercel cron endpoint every 15 minutes to keep the LLM enrichment
# moving until 100% coverage is reached. Survives any local session reset.
# Free (GitHub Actions free tier: 2,000 min/month, we use ~3 min/month).
#
# Required secret: CRON_SECRET (same value set in Vercel env vars).

on:
  schedule:
    # GitHub Actions cron — every 15 min. Note: GH can delay by up to ~10 min
    # during peak hours, so effective cadence may be 15-25 min. Fine for our use.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}  # allow manual trigger from the Actions tab

jobs:
  trigger-enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call enrich-batch
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET not set in repo secrets"
            exit 1
          fi
          RESP=$(curl -sSL --max-time 60 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://www.workflowstacks.com/api/cron/enrich-batch?limit=20")
          echo "Response: $RESP"
          # Don't fail the workflow on rate-limit errors — next run picks up
          echo "$RESP" | grep -qE '"pass1_enrichNew"|"pass2_refillBestWith"' && echo "OK" || echo "::warning::Endpoint did not return expected shape"

      - name: Show coverage
        run: |
          curl -sSL "https://www.workflowstacks.com/api/enrich-skills" -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" 2>&1 | head -c 400 || true
