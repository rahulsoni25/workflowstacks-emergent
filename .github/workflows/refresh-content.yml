name: Refresh marketplace content

# Pulls newest GitHub repos, rewrites + quality-gates them, and dedupes —
# by calling the deployed API (logic stays server-side; only the admin secret
# lives here). Runs daily and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch: {} # manual "Run workflow" button

env:
  BASE_URL: https://workflowstacks-emergent.vercel.app

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Discover — pull newest GitHub repos
        run: |
          curl -sf -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
            "$BASE_URL/api/ingest?sort=updated&days=120" | tee /tmp/ingest.json
          echo

      - name: Normalize — fix categories
        run: |
          curl -sf -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
            "$BASE_URL/api/reclassify" | tee /tmp/reclassify.json
          echo

      - name: Rewrite titles + descriptions (judge-gated to 8/10+)
        run: |
          # Groq free tier = ~12k TPM = ~6 enrichments / minute. Sleep 62s
          # between batches so we don't get rate-limited and bail early.
          for i in $(seq 1 25); do
            R=$(curl -sf -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
              "$BASE_URL/api/agent-rewrite?onlyNew=true&pending=true&top=true&limit=6") || break
            U=$(echo "$R" | jq -r '.updated // 0')
            P=$(echo "$R" | jq -r '.published // 0')
            echo "batch $i: updated=$U published=$P"
            [ "$U" = "0" ] && break
            sleep 62
          done

      - name: Enrich skill use_guides (install / quick-start / gotcha)
        run: |
          # Second pass — fills in the per-skill "how to use it" content.
          # Same rate-limit pacing.
          for i in $(seq 1 25); do
            R=$(curl -sf -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
              "$BASE_URL/api/agent-rewrite?mode=enrich-skills&pending=true&top=true&limit=6") || break
            E=$(echo "$R" | jq -r '.enriched // 0')
            echo "batch $i: enriched=$E"
            [ "$E" = "0" ] && break
            sleep 62
          done

      - name: De-duplicate
        run: |
          curl -sf -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
            "$BASE_URL/api/dedupe" | tee /tmp/dedupe.json
          echo

      - name: Extract MCP configs from repos (small batch)
        run: |
          curl -sf -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
            "$BASE_URL/api/enrich-mcp-configs?limit=10" | tee /tmp/mcp.json
          echo

      - name: Cleanup — strip legacy fabricated metrics, purge test data
        run: |
          curl -sf -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
            "$BASE_URL/api/cleanup" | tee /tmp/cleanup.json
          echo

      - name: Weekly digest email (Mondays only)
        if: github.event_name == 'schedule'
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            curl -sf -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
              "$BASE_URL/api/digest/send" | tee /tmp/digest.json
            echo
          else
            echo "Not Monday — skipping digest."
          fi

      - name: Auto-discover from trending searches
        run: |
          curl -sf -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
            "$BASE_URL/api/auto-discover-from-searches?limit=10" | tee /tmp/discover.json
          echo

      - name: Refresh live GitHub star/fork counts (rotates through catalog)
        run: |
          curl -sf -H "x-admin-secret: ${{ secrets.ADMIN_SECRET }}" \
            "$BASE_URL/api/refresh-stars?max=80" | tee /tmp/stars.json
          echo

      - name: Summary
        run: |
          echo "### Content refresh complete" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat /tmp/ingest.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '' >> $GITHUB_STEP_SUMMARY
          cat /tmp/dedupe.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '' >> $GITHUB_STEP_SUMMARY
          cat /tmp/stars.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '```' >> $GITHUB_STEP_SUMMARY
